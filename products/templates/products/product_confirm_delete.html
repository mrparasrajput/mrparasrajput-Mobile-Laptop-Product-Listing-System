{% extends 'products/base.html' %}
{% block title %}Delete — TechVault{% endblock %}
{% block content %}
<div style="max-width:440px;margin:3rem auto;background:var(--s2);border:1px solid rgba(255,80,100,.3);border-radius:18px;padding:2.2rem;text-align:center">
  <div style="font-size:3rem;margin-bottom:1rem">🗑️</div>
  <h2 style="font-size:1.4rem;font-weight:900;margin-bottom:.5rem">Delete Product?</h2>
  <p style="color:var(--muted);font-size:.88rem;line-height:1.6">
    You're about to permanently delete<br>
    <strong style="color:var(--text)">{{ product.brand }} {{ product.name }}</strong>.<br>
    This cannot be undone.
  </p>
  <form method="POST">
    {% csrf_token %}
    <div style="display:flex;gap:.75rem;justify-content:center;margin-top:1.8rem">
      <button type="submit" class="btn btn-solid-danger">Yes, Delete</button>
      <a href="/" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
